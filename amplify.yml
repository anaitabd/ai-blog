version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
        - env | grep -E '^(DATABASE_URL|ADMIN_API_KEY|CLOUDFRONT_DOMAIN|NEXTJS_SITE_URL|NEXT_PUBLIC_|PINTEREST_|REGION|S3_BUCKET|STATE_MACHINE_ARN|TOPICS_TABLE|WEBHOOK_SECRET)=' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

