version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
        - env | grep -E '^(DATABASE_URL|ADMIN_API_KEY|CLOUDFRONT_DOMAIN|NEXTJS_SITE_URL|NEXT_PUBLIC_|PINTEREST_|REGION|S3_BUCKET|STATE_MACHINE_ARN|TOPICS_TABLE|WEBHOOK_SECRET|APP_KEY_ID|APP_KEY_SECRET|INTERNAL_SECRET|SES_FROM_EMAIL|YOUTUBE_CLIENT_ID|YOUTUBE_CLIENT_SECRET|YOUTUBE_ON_DEMAND_ARN)=' > .env.production
        - node scripts/seed-categories.js
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

